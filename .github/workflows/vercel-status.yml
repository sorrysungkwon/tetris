name: Vercel Deployment Status

# Tracks each push through the full Vercel lifecycle and mirrors it to
# GitHub Deployments so the repo shows:  Queued → In Progress → Ready / Error / Canceled
#
# Prerequisites — add these repo secrets (Settings → Secrets → Actions):
#   VERCEL_TOKEN  : your Vercel personal access token (vercel.com → Account Settings → Tokens)
#
# The Vercel GitHub App still handles the actual build+deploy.
# This workflow only reads the Vercel API and writes GitHub Deployment statuses.

on:
  push:
    branches: [preview, master]

permissions:
  deployments: write

jobs:
  track:
    name: Track Vercel deployment
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      # ── 1. Create a GitHub Deployment record in "queued" state ───────────────
      - name: Create GitHub Deployment (queued)
        id: gh_deploy
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const isProd = context.ref === 'refs/heads/master';
            const dep = await github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo:  context.repo.repo,
              ref:   context.sha,
              environment:            isProd ? 'Production' : 'Preview',
              auto_merge:             false,
              required_contexts:      [],
              transient_environment:  !isProd,
              production_environment: isProd,
            });
            await github.rest.repos.createDeploymentStatus({
              owner:         context.repo.owner,
              repo:          context.repo.repo,
              deployment_id: dep.data.id,
              state:         'queued',
              description:   'Waiting for Vercel to pick up the build…',
            });
            core.setOutput('id', String(dep.data.id));

      # ── 2. Poll Vercel API until the deployment for this commit is found ─────
      - name: Wait for Vercel deployment + poll to completion
        id: poll
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          COMMIT_SHA:   ${{ github.sha }}
        run: |
          set -euo pipefail
          DEPLOY_ID=""
          DEPLOY_URL=""
          FINAL_STATE="error"

          echo "::group::Looking for Vercel deployment (commit ${COMMIT_SHA:0:12})"

          # Give Vercel up to ~3 min to register the deployment
          for i in $(seq 1 18); do
            sleep 10
            RESP=$(curl -sf "https://api.vercel.com/v6/deployments?limit=10" \
              -H "Authorization: Bearer $VERCEL_TOKEN" 2>/dev/null || echo '{"deployments":[]}')

            DEPLOY_ID=$(echo "$RESP" | jq -r --arg sha "${COMMIT_SHA:0:12}" \
              '.deployments[]? | select(.meta.githubCommitSha // "" | startswith($sha)) | .uid' \
              2>/dev/null | head -1)

            if [ -n "$DEPLOY_ID" ]; then
              echo "Found deployment: $DEPLOY_ID (attempt $i)"
              break
            fi
            echo "Not found yet (attempt $i)…"
          done
          echo "::endgroup::"

          if [ -z "$DEPLOY_ID" ]; then
            echo "Could not find Vercel deployment for this commit."
            echo "final_state=error" >> "$GITHUB_OUTPUT"
            echo "deploy_url="       >> "$GITHUB_OUTPUT"
            echo "deploy_id="        >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "deploy_id=$DEPLOY_ID" >> "$GITHUB_OUTPUT"
          echo "::group::Polling Vercel deployment $DEPLOY_ID"

          # Poll for completion (up to ~5 min)
          for i in $(seq 1 60); do
            sleep 5
            DDATA=$(curl -sf "https://api.vercel.com/v13/deployments/$DEPLOY_ID" \
              -H "Authorization: Bearer $VERCEL_TOKEN" 2>/dev/null || echo '{}')

            READY=$(echo "$DDATA" | jq -r '.readyState // ""' 2>/dev/null)
            echo "  [$i] readyState=$READY"

            case "$READY" in
              READY)
                DEPLOY_URL=$(echo "$DDATA" | jq -r '"https://"+.url' 2>/dev/null)
                FINAL_STATE="success"
                break ;;
              ERROR)     FINAL_STATE="failure";  break ;;
              CANCELED)  FINAL_STATE="inactive"; break ;;
              # INITIALIZING / BUILDING / QUEUED — keep polling
            esac
          done

          echo "::endgroup::"
          echo "final_state=$FINAL_STATE" >> "$GITHUB_OUTPUT"
          echo "deploy_url=$DEPLOY_URL"   >> "$GITHUB_OUTPUT"

      # ── 3. Mark as "in_progress" once deployment is found ───────────────────
      - name: Update GitHub Deployment → in_progress
        if: steps.poll.outputs.deploy_id != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            await github.rest.repos.createDeploymentStatus({
              owner:         context.repo.owner,
              repo:          context.repo.repo,
              deployment_id: Number('${{ steps.gh_deploy.outputs.id }}'),
              state:         'in_progress',
              description:   'Building on Vercel…',
              log_url:       'https://vercel.com/seonqwer-3337s-projects/glowtris',
            });

      # ── 4. Final status: success / failure / inactive / error ───────────────
      - name: Update GitHub Deployment → final state
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const state = '${{ steps.poll.outputs.final_state }}' || 'error';
            const url   = '${{ steps.poll.outputs.deploy_url }}';
            const desc  = {
              success:  'Deployed ✓',
              failure:  'Vercel build failed',
              inactive: 'Deployment canceled',
              error:    'Could not determine deployment status',
            }[state] ?? state;

            await github.rest.repos.createDeploymentStatus({
              owner:           context.repo.owner,
              repo:            context.repo.repo,
              deployment_id:   Number('${{ steps.gh_deploy.outputs.id }}'),
              state,
              description:     desc,
              environment_url: url || undefined,
              log_url:         'https://vercel.com/seonqwer-3337s-projects/glowtris',
            });
